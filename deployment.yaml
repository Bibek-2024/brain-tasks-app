apiVersion: apps/v1
kind: Deployment
metadata:
  name: brain-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: brain-app
  template:
    metadata:
      labels:
        app: brain-app
    spec:
      containers:
      - name: brain-container
        # Use your exact ECR URL from the Jenkins logs
        image: public.ecr.aws/j9y5x1y8/brain-tasks-app/brain-tasks-app:latest
        ports:
        - containerPort: 3000
