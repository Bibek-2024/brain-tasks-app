server {
    listen 3000;

    root /usr/share/nginx/html;
    index index.html;

    # React routing support
    location / {
        try_files $uri /index.html;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "Healthy\n";
        add_header Content-Type text/plain;
    }
}
