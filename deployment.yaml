apiVersion: apps/v1
kind: Deployment
metadata:
  name: brain-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: brain-app
  template:
    metadata:
      labels:
        app: brain-app
    spec:
      containers:
      - name: brain-app
        # Placeholder for the image tag used by the pipeline
        image: CONTAINER_IMAGE 
        ports:
        - containerPort: 3000
